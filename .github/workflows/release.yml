name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main branch
        run: git fetch origin main --no-tags
      - name: Validate tag points to the current main HEAD
        run: |
          main_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_sha" ]; then
              echo "Release tags must point to the current origin/main HEAD." >&2
              echo "Tag commit:  $GITHUB_SHA" >&2
              echo "Main commit: $main_sha" >&2
              exit 1
          fi
      - name: Validate release tag and version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected_tag = f"v{pyproject_version}"

          cookbook_mismatches: dict[str, str] = {}
          for cookbook_pyproject in Path("cookbook").rglob("pyproject.toml"):
              cookbook_version = tomllib.loads(cookbook_pyproject.read_text(encoding="utf-8"))["project"][
                  "version"
              ]
              if cookbook_version != pyproject_version:
                  cookbook_mismatches[str(cookbook_pyproject)] = cookbook_version

          if tag != expected_tag or cookbook_mismatches:
              raise SystemExit(
                  "SimLab release version mismatch.\n"
                  f"  tag: {tag!r}\n"
                  f"  pyproject.toml [project].version: {pyproject_version!r}\n"
                  f"  cookbook pyproject mismatches: {cookbook_mismatches!r}\n"
                  f"  expected tag: {expected_tag!r}\n"
              )
          PY
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Build distribution
        run: uvx --from build pyproject-build
      - name: Twine check
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
