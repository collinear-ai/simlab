name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main branch
        run: git fetch origin main --no-tags
      - name: Validate tag points to the current main HEAD
        run: |
          main_sha="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$main_sha" ]; then
              echo "Release tags must point to the current origin/main HEAD." >&2
              echo "Tag commit:  $GITHUB_SHA" >&2
              echo "Main commit: $main_sha" >&2
              exit 1
          fi
      - name: Validate release tag and version
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          pyproject_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected_tag = f"v{pyproject_version}"

          cookbook_mismatches: dict[str, str] = {}
          for cookbook_pyproject in Path("cookbook").rglob("pyproject.toml"):
              cookbook_version = tomllib.loads(cookbook_pyproject.read_text(encoding="utf-8"))["project"][
                  "version"
              ]
              if cookbook_version != pyproject_version:
                  cookbook_mismatches[str(cookbook_pyproject)] = cookbook_version

          if tag != expected_tag or cookbook_mismatches:
              raise SystemExit(
                  "SimLab release version mismatch.\n"
                  f"  tag: {tag!r}\n"
                  f"  pyproject.toml [project].version: {pyproject_version!r}\n"
                  f"  cookbook pyproject mismatches: {cookbook_mismatches!r}\n"
                  f"  expected tag: {expected_tag!r}\n"
              )
          PY
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Update GHCR latest tags to match release version
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          tool_dir="src/simlab/catalog/tools"

          images="$(
            awk '$1 == "image:" { print $2 }' "${tool_dir}"/*.yaml \
              | tr -d "'\"" \
              | sed -n 's|^\(collinear/[^[:space:]#]*\):latest$|\1|p' \
              | sort -u
          )"

          if [ -z "$images" ]; then
            echo "No tool images found under ${tool_dir}." >&2
            exit 1
          fi

          echo "Tool images to retag:"
          echo "$images"

          while IFS= read -r image; do
            source_image="${REGISTRY}/${image}:${version}"
            target_image="${REGISTRY}/${image}:latest"
            echo "Pinning ${target_image} <- ${source_image}"
            docker buildx imagetools create --tag "${target_image}" "${source_image}"
          done <<< "$images"
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
      - name: Build distribution
        run: uvx --from build pyproject-build
      - name: Twine check
        run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
