name: custom-cli-tools
tools:
  - coding
scenario_guidance_md: |
  # Custom CLI Tools Example Guidance

  These conventions apply to this coding task bundle.

  ## Skill Usage

  - Specialized coding skills may be available through the tool server.
  - Before guessing command syntax for unfamiliar tools, search for a relevant skill and read it.

  ## Existing Tools

  - This environment is expected to provide CLI tools for PDF and XLSX extraction.
  - Prefer those tools over writing custom Python parsers.

  ## Output Quality

  - Verify important numeric values before writing the final report.
  - After writing the report, read it back to confirm the required facts are present.
coding:
  setup_scripts:
    - ./coding/setup/install-tools.sh
  skills:
    - ./coding/skills
  mounts:
    - source: ./coding/fixtures
      target: /workspace/fixtures
      read_only: true
