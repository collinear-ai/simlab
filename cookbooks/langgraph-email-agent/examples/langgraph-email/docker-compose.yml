services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    networks:
    - simlab
    ports:
    - 8025:8025
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8025/api/v2/messages || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  email-env:
    image: ghcr.io/collinear-ai/collinear/email-env:latest
    networks:
    - simlab
    ports:
    - 8040:8040
    environment:
      MAILHOG_BASE_URL: http://mailhog:8025
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: '1025'
    depends_on:
      mailhog:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  mcp-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
    - 8080:8080
    environment:
      CONFIG_PATH: /config/mcp-gateway-config.json
      MCP_GATEWAY_CONFIG: "{\n  \"servers\": [\n    {\n      \"name\": \"edgar-mcp\",\n      \"transport\": \"stdio\",\n      \"command\": \"uvx --from sec-edgar-mcp==1.0.8 sec-edgar-mcp\",\n      \"env\": {\n        \"SEC_EDGAR_USER_AGENT\": \"SimLab LangGraph Email Agent Example (simlab@example.com)\"\n      }\n    }\n  ]\n}"
      MCP_GATEWAY_PORT: '8080'
      SIMLAB_MCP_EDGAR_MCP__SEC_EDGAR_USER_AGENT: ${SEC_EDGAR_USER_AGENT}
    volumes:
    - /Users/adit/Downloads/rl-gym/.worktrees/pr-620/cli/simlab/cookbooks/langgraph-email-agent/examples/langgraph-email/mcp-gateway-config.json:/config/mcp-gateway-config.json:ro
    networks:
    - simlab
networks:
  simlab:
    driver: bridge
