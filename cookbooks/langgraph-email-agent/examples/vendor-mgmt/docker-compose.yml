services:
  mailhog:
    image: mailhog/mailhog:v1.0.1
    networks:
    - simlab
    ports:
    - 8025:8025
    healthcheck:
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:8025/api/v2/messages || exit 1
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  email-env:
    image: ghcr.io/collinear-ai/collinear/email-env:latest
    networks:
    - simlab
    ports:
    - 8040:8040
    environment:
      MAILHOG_BASE_URL: http://mailhog:8025
      MAILHOG_SMTP_HOST: mailhog
      MAILHOG_SMTP_PORT: '1025'
    depends_on:
      mailhog:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8040/health')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
  erp-env:
    image: ghcr.io/collinear-ai/collinear/erp-env:latest
    networks:
    - simlab
    ports:
    - 8100:8100
    environment:
      ERP_FIXED_NOW: '2026-03-18T12:00:00+00:00'
      ERP_SEED_DATA_PATH: /app/src/toolsets/erp/seed_data/erp_seed_data.json
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
  erp-seed:
    image: ghcr.io/collinear-ai/collinear/erp-env:latest
    networks:
    - simlab
    profiles:
    - seed
    depends_on:
      erp-env:
        condition: service_healthy
    command:
    - python3
    - -c
    - import urllib.request; urllib.request.urlopen( urllib.request.Request('http://erp-env:8100/reset', data=b'', method='POST') ).read()
networks:
  simlab:
    driver: bridge
