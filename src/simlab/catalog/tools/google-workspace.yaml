name: google-workspace
display_name: Google Workspace
description: Google Drive, Docs, Sheets, and Gmail integration tools.
category: productivity
tool_server_port: 8090

exposed_ports: []

required_env_vars:
  - CREDENTIALS_CONFIG
  - CREDENTIALS_EMAIL

services:
  google-workspace-tool-server:
    image: collinear/google-workspace-tool-server:latest
    ports:
      - "8090"
    environment:
      CREDENTIALS_CONFIG: ${CREDENTIALS_CONFIG}
      CREDENTIALS_EMAIL: ${CREDENTIALS_EMAIL}
      TOOL_SERVER_PORT: "8090"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
