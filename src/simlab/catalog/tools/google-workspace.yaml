name: google-workspace
display_name: Google Workspace
description: Google Drive, Docs, Sheets, and Gmail integration tools.
category: productivity
tool_server_port: 8090

exposed_ports: []

required_env_vars:
  - name: CREDENTIALS_CONFIG
    description: "Base64-encoded OAuth credential JSON from workspace-mcp (see Google Workspace README)"
  - name: CREDENTIALS_EMAIL
    description: "Google account email used for OAuth authentication (e.g., user@company.com)"
  - name: DRIVE_NAMESPACE_ROOT_FOLDER_ID
    description: "(Optional) Google Drive folder ID where per-rollout workspace folders are created"

services:
  google-workspace-tool-server:
    image: collinear/google-workspace-tool-server:latest
    ports:
      - "8090"
    environment:
      CREDENTIALS_CONFIG: ${CREDENTIALS_CONFIG}
      CREDENTIALS_EMAIL: ${CREDENTIALS_EMAIL}
      DRIVE_NAMESPACE_ROOT_FOLDER_ID: ${DRIVE_NAMESPACE_ROOT_FOLDER_ID}
      TOOL_SERVER_PORT: "8090"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
